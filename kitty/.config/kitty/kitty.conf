# vim:fileencoding=utf-8:foldmethod=marker

# {{{ Fonts

font_family      Cascadia Code
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

modify_font cell_height 105%
modify_font baseline 0

disable_ligatures never

font_features +liga

# text_composition_strategy legacy
text_composition_strategy 1.0 20

# }}}

# {{{ Cursor

cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval -1
cursor_stop_blinking_after 15.0

# }}}

# {{{ Scrollback

scrollback_lines 10000
scrollback_pager_history_size 10
scrollback_fill_enlarged_window yes

# }}}

# {{{ Mouse

mouse_hide_wait 3.0
url_style curly
open_url_with default
copy_on_select clipboard
strip_trailing_spaces smart

# }}}

# {{{ Performance

sync_to_monitor yes
repaint_delay 10
input_delay 3

# }}}

# {{{ Window

window_padding_width 20
placement_strategy center
draw_minimal_borders yes
confirm_os_window_close 0
hide_window_decorations no
resize_draw_strategy static

# }}}

# }}}

# {{{ Tab bar

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# }}}

# {{{ Bell

enable_audio_bell no
visual_bell_duration 0.0

# }}}

# {{{ Shell integration

shell_integration enabled

# }}}

# {{{ Advanced - Required for PAI tab state management
allow_remote_control yes
listen_on unix:/tmp/kitty
update_check_interval 0
startup_session none
allow_hyperlinks yes

# }}}

# {{{ Advanced

term xterm-256color
notify_on_cmd_finish unfocused 10.0

# }}}

# {{{ Keyboard shortcuts

# Copy/Paste (ctrl+alt like urxvt instead of ctrl+shift)
map ctrl+shift+c no_op
map ctrl+shift+v no_op
map ctrl+alt+c copy_to_clipboard
map ctrl+alt+v paste_from_clipboard

map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

map ctrl+shift+a>m set_background_opacity +0.02
map ctrl+shift+a>l set_background_opacity -0.02
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default

# }}}

# {{{ Fallback colors (overridden by pywal include below)

foreground   #a39e9b
background   #2f1e2e
cursor       #a39e9b

color0       #2f1e2e
color8       #776e71
color1       #ef6155
color9       #ef6155
color2       #48b685
color10      #48b685
color3       #fec418
color11      #fec418
color4       #06b6ef
color12      #06b6ef
color5       #815ba4
color13      #815ba4
color6       #5bc4bf
color14      #5bc4bf
color7       #a39e9b
color15      #e7e9db

active_tab_foreground   #2f1e2e
active_tab_background   #a39e9b
inactive_tab_foreground #a39e9b
inactive_tab_background #2f1e2e

selection_foreground #ffffff
selection_background #FF00FF

# }}}

# {{{ Pywal colors

include ~/.cache/wal/colors-kitty.conf

# }}}

# {{{ Transparency (after pywal include to override its background_opacity 1.0)

# Background
# Note: background_opacity must be 1.0 for background images to work properly
# Use background_tint to control image opacity instead
background_opacity 0.94
dynamic_background_opacity no
background_blur 0
background_tint 0.92

# }}}

# Nerd Fonts v3.3.0

symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# {{{ Per-machine overrides (gitignored, silently ignored if missing)

include local.conf

# }}}
